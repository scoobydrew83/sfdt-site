name: Build check

# Deploys are handled by Cloudflare Workers Builds (dashboard git integration,
# README "Deploy" option A): Cloudflare builds and deploys the `sfdt-site`
# Worker on every push to master. This workflow only verifies the site builds
# (next export + pagefind), so a broken commit is caught on the PR before
# Cloudflare deploys it. It needs no secrets.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (next export + pagefind index)
        run: npm run build
